<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>THEVOIR Admin Login</title>
</head>
<body>
  <h1>Admin Giriş</h1>
  <form method="post" action="/admin-login">
    <div>
      <label>E-posta</label>
      <input type="email" name="email" required />
    </div>
    <div>
      <label>Şifre</label>
      <input type="password" name="password" required />
    </div>
    <button type="submit">Giriş Yap</button>
  </form>
</body>
</html>
